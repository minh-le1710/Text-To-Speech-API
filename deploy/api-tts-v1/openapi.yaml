openapi: 3.0.1

info:
  title: CapCut TTS Wrapper API
  description: Backend-only CapCut wrapper for text and DOCX to MP3 workflows.
  version: 2.2.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      tags:
        - System
      responses:
        '200':
          description: Service is reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /v1/models:
    get:
      summary: List available voice models
      tags:
        - Models
      responses:
        '200':
          description: Voice model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
        '502':
          description: Failed to fetch voice models from CapCut
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/synthesize:
    get:
      summary: Synthesize text to MP3
      tags:
        - TTS
      parameters:
        - name: text
          in: query
          required: true
          schema:
            type: string
          example: Hello
        - name: type
          in: query
          required: false
          schema:
            oneOf:
              - type: integer
              - type: string
            default: 0
        - name: voice
          in: query
          required: false
          schema:
            type: string
        - name: pitch
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: speed
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: volume
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: method
          in: query
          required: false
          schema:
            type: string
            enum:
              - buffer
              - stream
            default: buffer
      responses:
        '200':
          description: MP3 audio
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: CapCut authentication or synthesis failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/synthesize/docx:
    post:
      summary: Synthesize DOCX to MP3
      tags:
        - TTS
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                type:
                  oneOf:
                    - type: integer
                    - type: string
                  default: 0
                voice:
                  type: string
                pitch:
                  type: integer
                  default: 10
                speed:
                  type: integer
                  default: 10
                volume:
                  type: integer
                  default: 10
                filename:
                  type: string
      responses:
        '200':
          description: MP3 audio. Long DOCX jobs are checkpointed to SQLite and disk automatically.
          headers:
            X-CapCut-TTS-Job-Id:
              description: Stable checkpoint job id for this DOCX synthesis request.
              schema:
                type: string
            X-CapCut-TTS-Total-Chunks:
              description: Number of TTS chunks generated from the document.
              schema:
                type: integer
            X-CapCut-TTS-Completed-Chunks:
              description: Number of chunks marked completed in the checkpoint store.
              schema:
                type: integer
            X-CapCut-TTS-Resumed-Chunks:
              description: Number of chunks reused from a previous partial run.
              schema:
                type: integer
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid upload or DOCX content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: CapCut authentication or synthesis failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/synthesize/docx/jobs:
    post:
      summary: Create an async DOCX synthesis job
      tags:
        - TTS
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                type:
                  oneOf:
                    - type: integer
                    - type: string
                  default: 0
                voice:
                  type: string
                pitch:
                  type: integer
                  default: 10
                speed:
                  type: integer
                  default: 10
                volume:
                  type: integer
                  default: 10
                filename:
                  type: string
      responses:
        '202':
          description: Job accepted and running in the background
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocxJob'
        '200':
          description: Existing completed job was reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocxJob'
        '400':
          description: Invalid upload or DOCX content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Failed to create DOCX job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/synthesize/docx/jobs/{jobId}:
    get:
      summary: Get async DOCX synthesis job status
      tags:
        - TTS
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocxJob'
        '404':
          description: Job was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/synthesize/docx/jobs/{jobId}/resume:
    post:
      summary: Resume an async DOCX synthesis job from its stored input/checkpoints
      tags:
        - TTS
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Resume started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocxJob'
        '404':
          description: Job was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Job cannot be resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/synthesize/docx/jobs/{jobId}/download:
    get:
      summary: Download a completed async DOCX synthesis MP3
      tags:
        - TTS
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: MP3 audio
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '404':
          description: Job was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Job is not ready for download
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /legacy/synthesize:
    get:
      summary: Synthesize text with the legacy flow
      tags:
        - TTS
      parameters:
        - name: text
          in: query
          required: true
          schema:
            type: string
          example: Hello
        - name: type
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: pitch
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: speed
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: volume
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: method
          in: query
          required: false
          schema:
            type: string
            enum:
              - buffer
              - stream
            default: buffer
      responses:
        '200':
          description: WAV audio
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Legacy synthesis failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Legacy environment variables are not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Failed to synthesize audio
    DocxJob:
      type: object
      properties:
        jobId:
          type: string
          example: aba39c2cf931bdd77d9df37e4d8a975b
        status:
          type: string
          enum:
            - pending
            - running
            - completed
            - failed
        fileName:
          type: string
          example: output.mp3
        totalChunks:
          type: integer
          example: 1492
        completedChunks:
          type: integer
          example: 42
        progress:
          type: number
          example: 0.028
        progressPercent:
          type: number
          example: 2.8
        active:
          type: boolean
        downloadReady:
          type: boolean
        contentType:
          type: string
          example: audio/mpeg
        contentLength:
          type: string
          example: '1736685'
        errorMessage:
          type: string
        statusUrl:
          type: string
          example: /v1/synthesize/docx/jobs/aba39c2cf931bdd77d9df37e4d8a975b
        downloadUrl:
          type: string
          example: /v1/synthesize/docx/jobs/aba39c2cf931bdd77d9df37e4d8a975b/download
        resumeUrl:
          type: string
          example: /v1/synthesize/docx/jobs/aba39c2cf931bdd77d9df37e4d8a975b/resume
    Model:
      type: object
      properties:
        id:
          type: string
          example: '7530105822785899777'
        title:
          type: string
          example: Labebe
        description:
          type: string
          example: Bright female voice
        speaker:
          type: string
          example: ICL_en_female_jiaoao
        effectId:
          type: string
          example: '7530105822785899777'
        resourceId:
          type: string
          example: '7530105822785899777'
